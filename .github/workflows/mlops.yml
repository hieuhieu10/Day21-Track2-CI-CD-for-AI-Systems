name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
      - '.github/workflows/mlops.yml'
  workflow_dispatch:

jobs:

  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v


  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to AWS S3
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          echo '${{ secrets.CLOUD_CREDENTIALS }}' > /tmp/aws-creds.json
          python - <<'PY'
          import json
          import os

          creds = json.load(open("/tmp/aws-creds.json"))
          region = creds.get("region", "ap-southeast-1")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"AWS_ACCESS_KEY_ID={creds['aws_access_key_id']}\n")
              f.write(f"AWS_SECRET_ACCESS_KEY={creds['aws_secret_access_key']}\n")
              f.write(f"AWS_DEFAULT_REGION={region}\n")
              f.write(f"CLOUD_BUCKET={os.environ['CLOUD_BUCKET']}\n")
          PY

      - name: Pull data with DVC
        run: dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload model to S3
        run: |
          python - <<'EOF'
          import os
          import boto3

          s3 = boto3.client("s3")
          bucket = os.environ["CLOUD_BUCKET"]
          key = "models/latest/model.pkl"
          s3.upload_file("models/model.pkl", bucket, key)
          print(f"Uploaded model to s3://{bucket}/{key}")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json


  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:

      - name: Check eval gate
        run: |
          python - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          if acc < 0.70:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.70. Huy deploy.")
          print(f"PASSED: accuracy {acc:.4f} >= 0.70. Dang trien khai model.")
          EOF


  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:

      - name: SSH deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: true
          script: |
            sudo systemctl restart mlops-serve
            for i in 1 2 3 4 5 6; do
              sleep 5
              if curl -sf http://localhost:8000/health; then
                echo "Health check passed."
                exit 0
              fi
              echo "Waiting for server... attempt $i"
            done
            echo "Health check failed after restart."
            sudo journalctl -u mlops-serve -n 20 --no-pager
            exit 1
